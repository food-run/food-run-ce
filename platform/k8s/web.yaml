# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
TL;DR  -->  Web service Kubernetes manifest for local k3s

- Role:
    --> One manifest for the Web frontend service
    --> Serves Angular static build via nginx
    --> Uses nginx:alpine image from platform/docker/web.Dockerfile

- Consumed By:
    --> kubectl apply -f platform/k8s/web.yaml
    --> tools/scripts/dev.py
~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        tier: frontend
    spec:
      containers:
        - name: web
          image: foodrun/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          # Liveness probe - nginx health endpoint
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          # Readiness probe - same as liveness for static content
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: SERVICE_NAME
              value: "web"
            - name: SERVICE_ENV
              value: "local"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app: web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app: web
