# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
TL;DR  -->  Worker service Kubernetes manifest for local k3s

- Role:
    --> One manifest for the Worker service
    --> Python background job processor
    --> Uses python:3.11-slim image from platform/docker/worker.Dockerfile

- Consumed By:
    --> kubectl apply -f platform/k8s/worker.yaml
    --> tools/scripts/dev.py
~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        tier: backend
    spec:
      containers:
        - name: worker
          image: foodrun/worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          # Liveness probe - /health endpoint
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          env:
            - name: SERVICE_NAME
              value: "worker"
            - name: SERVICE_ENV
              value: "local"
            - name: RELEASE_ID
              value: "dev-build"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  labels:
    app: worker
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      name: http
  selector:
    app: worker
