## TL;DR
# - keeps release-readiness policy in `tools/script/release.py`
# - stays manual-only so D4 does not pretend real deployment maturity exists yet
# - prepares release metadata and guardrails without publishing or deploying anything

name: release prep

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare_release:
    name: prepare release readiness
    runs-on: ubuntu-latest

    steps:
      # Fetch the repository for the release-prep run.
      - name: checkout repo
        uses: actions/checkout@v4

      # Install the Python runtime used by the release seam.
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Delegate release-readiness policy to the shared script seam.
      - name: run release preparation
        run: python3 tools/script/release.py --ci prepare
