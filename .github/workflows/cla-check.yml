## TL;DR
# - keeps the exact CLA phrase requirement for outside contributors
# - skips the phrase check when the repository owner authors the PR
# - logs the owner-aware branch clearly so contributors know why the gate passed or failed

name: cla phrase check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  cla_phrase_check:
    name: verify cla phrase in pr body
    runs-on: ubuntu-latest

    steps:
      # Inspect the PR body without checking out the repo.
      - name: check pr body for required cla phrase
        uses: actions/github-script@v7
        with:
          script: |
            const required = "I agree to the CLA in CLA.md";

            const pr = context.payload.pull_request;
            const body = (pr && pr.body) ? pr.body : "";
            const author = (pr && pr.user && pr.user.login) ? pr.user.login : "";
            const repositoryOwner = context.payload.repository.owner.login;

            if (author === repositoryOwner) {
              core.info("owner-authored PR detected; skipping CLA phrase enforcement for the repository owner.");
              return;
            }

            if (!body.includes(required)) {
              core.setFailed(
                [
                  "missing required cla phrase in pr description.",
                  "",
                  "add this exact line to the pr body:",
                  required
                ].join("\n")
              );
            } else {
              core.info("cla phrase found.");
            }
